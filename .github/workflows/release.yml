name: Release (PyPI)
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ─── Linux (manylinux, glibc) ────────────────────────────────────────────────
  linux:
    name: Linux (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v5
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          sccache: "true"
          args: --release --out dist -i python3.9 python3.10 python3.11 python3.12 python3.13 python3.14
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  # ─── Linux (musllinux, Alpine) ───────────────────────────────────────────────
  musllinux:
    name: musllinux (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v5
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: musllinux_1_2
          sccache: "true"
          args: --release --out dist -i python3.9 python3.10 python3.11 python3.12 python3.13 python3.14
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-musllinux-${{ matrix.target }}
          path: dist

  # ─── Windows (x64) ───────────────────────────────────────────────────────────
  windows:
    name: Windows (py${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
      - uses: PyO3/maturin-action@v1
        with:
          sccache: "true"
          args: --release --out dist --find-interpreter
      # maturin's Windows wheels can carry trailing data after the ZIP end-of-
      # central-directory record. PyPI rejects that ("Trailing data") and some
      # readers even throw "Bad magic number". Repacking rebuilds a clean ZIP
      # (`wheel pack` recomputes RECORD), independent of the Python version.
      - name: Repack wheels (strip trailing data)
        shell: bash
        run: |
          python -m pip install -U wheel
          for whl in dist/*.whl; do
            python -m wheel unpack "$whl" -d _unpack
            rm "$whl"
            python -m wheel pack _unpack/* -d dist
            rm -rf _unpack
          done
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-${{ matrix.python-version }}
          path: dist

  # ─── macOS (Apple Silicon, arm64) ───────────────────────────────────────────
  macos:
    name: macOS (arm64, py${{ matrix.python-version }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: PyO3/maturin-action@v1
        with:
          sccache: "true"
          args: --release --out dist --find-interpreter
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-arm64-${{ matrix.python-version }}
          path: dist

  # ─── Source distribution ─────────────────────────────────────────────────────
  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: dist

  # ─── Publish ─────────────────────────────────────────────────────────────────
  publish:
    name: Publish (${{ github.event_name == 'release' && 'PyPI' || 'TestPyPI' }})
    runs-on: ubuntu-latest
    needs: [linux, musllinux, windows, macos, sdist]
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          skip-existing: true

      - name: Publish to PyPI
        if: github.event_name == 'release'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
