name: Release (PyPI)
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ─── Linux (manylinux, glibc) ────────────────────────────────────────────────
  linux:
    name: Linux (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          sccache: "true"
          args: --release --out dist --find-interpreter
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  # ─── Linux (musllinux, Alpine) ───────────────────────────────────────────────
  musllinux:
    name: musllinux (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: musllinux_1_2
          sccache: "true"
          args: --release --out dist --find-interpreter
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.target }}
          path: dist

  # ─── Windows (x64) ───────────────────────────────────────────────────────────
  windows:
    name: Windows (py${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
      - uses: PyO3/maturin-action@v1
        with:
          sccache: "true"
          args: --release --out dist --find-interpreter
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.python-version }}
          path: dist

  # ─── macOS (Intel + Apple Silicon) ───────────────────────────────────────────
  macos:
    name: macOS (${{ matrix.target }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.target == 'aarch64' && 'macos-14' || 'macos-13' }}
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        exclude:
          - target: aarch64
            python-version: "3.9"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: PyO3/maturin-action@v1
        with:
          sccache: "true"
          args: --release --out dist --find-interpreter
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}-${{ matrix.python-version }}
          path: dist

  # ─── Source distribution ─────────────────────────────────────────────────────
  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  # ─── Publish ─────────────────────────────────────────────────────────────────
  publish:
    name: Publish (${{ github.event_name == 'release' && 'PyPI' || 'TestPyPI' }})
    runs-on: ubuntu-latest
    needs: [linux, musllinux, windows, macos, sdist]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          skip-existing: true

      - name: Publish to PyPI
        if: github.event_name == 'release'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
