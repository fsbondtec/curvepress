name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Conan package + test_package ─────────────────────────────────────────
  conan:
    name: Conan (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Conan
        run: pip install "conan>=2.0"
      - name: Conan profile detect
        run: conan profile detect --force
      - name: conan create
        run: conan create . --build=missing

