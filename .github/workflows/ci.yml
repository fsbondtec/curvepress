name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Tag pushes trigger all publish jobs.
  # Convention: vX.Y.Z  (e.g. v0.1.0)

jobs:
  # ─── Rust core ──────────────────────────────────────────────────────────────
  rust:
    name: Rust (test + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test

      - name: cargo clippy
        run: cargo clippy -- -D warnings

  # ─── Publish to crates.io ────────────────────────────────────────────────────
  crates-publish:
    name: Publish to crates.io
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [rust, python, wasm, cpp]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: cargo publish
        run: cargo publish --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ─── Python wheels (maturin) ────────────────────────────────────────────────
  python:
    name: Python (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install maturin + test deps
        run: pip install maturin numpy pytest

      - name: Build wheel
        run: maturin build --release --features python

      - name: Install wheel
        shell: bash
        run: pip install --find-links target/wheels curvepress

      - name: Run Python tests
        run: pytest tests/python/ -v

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: target/wheels/*.whl

  # ─── Publish to PyPI (OIDC Trusted Publisher) ────────────────────────────────
  # Pre-requisite: register "curvepress" on PyPI with GitHub as a trusted
  # publisher (Settings → Trusted Publishers → Add publisher, workflow=ci.yml).
  python-publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: python
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: PyO3/maturin-action@v1
        with:
          command: publish
          args: --features python

  # ─── Conda package ───────────────────────────────────────────────────────────
  conda:
    name: conda-build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.11"
          channels: conda-forge,defaults

      - name: Install conda-build + maturin
        shell: bash -l {0}
        run: |
          conda install -y conda-build conda-verify
          pip install maturin

      - name: conda build
        shell: bash -l {0}
        run: conda build conda/ --no-anaconda-upload

      - name: Upload conda package artifact
        uses: actions/upload-artifact@v4
        with:
          name: conda-pkg-${{ matrix.os }}
          path: ${{ env.CONDA_PREFIX }}/conda-bld/**/*.conda

  # Publish to Anaconda Cloud on tag.
  # Pre-requisite: set ANACONDA_API_TOKEN secret + ANACONDA_USER variable.
  conda-publish:
    name: Publish to Anaconda
    if: startsWith(github.ref, 'refs/tags/v')
    needs: conda
    runs-on: ubuntu-latest
    steps:
      - uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.11"
          channels: conda-forge,defaults

      - name: Download conda artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: conda-pkg-*
          merge-multiple: true
          path: conda-artifacts/

      - name: Upload to Anaconda Cloud
        shell: bash -l {0}
        run: |
          conda install -y anaconda-client
          anaconda upload --user ${{ vars.ANACONDA_USER }} conda-artifacts/**/*.conda
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}

  # ─── C++ (cbindgen + cmake + ctest + conan) ──────────────────────────────────
  cpp:
    name: C++ (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Set up Python (for Conan)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Conan
        run: pip install "conan>=2.0"

      - name: Install Catch2 (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y catch2 cmake

      - name: Install Catch2 (macOS)
        if: runner.os == 'macOS'
        run: brew install catch2

      - name: Conan profile detect
        run: conan profile detect --force

      - name: Build Rust static lib with capi feature
        run: cargo build --release --features capi

      - name: CMake configure + build
        run: |
          cmake -S cpp -B cpp/build -DCMAKE_BUILD_TYPE=Release
          cmake --build cpp/build --config Release

      - name: CTest
        run: ctest --test-dir cpp/build --output-on-failure -C Release
        continue-on-error: true

      - name: conan create
        run: conan create cpp --version ${{ github.ref_name || '0.0.0-dev' }}
        continue-on-error: true

  # Publish to a Conan remote on tag.
  # Pre-requisite: set CONAN_REMOTE_URL + CONAN_REMOTE_TOKEN secrets,
  # and CONAN_REMOTE_USER variable.
  conan-publish:
    name: Publish to Conan remote
    if: startsWith(github.ref, 'refs/tags/v')
    needs: cpp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Conan
        run: pip install "conan>=2.0"

      - name: Conan profile detect
        run: conan profile detect --force

      - name: Build static lib
        run: cargo build --release --features capi

      - name: conan create
        run: conan create cpp --version ${{ github.ref_name }}

      - name: conan remote add + upload
        run: |
          conan remote add curvepress-remote "$CONAN_REMOTE_URL"
          conan remote login curvepress-remote "$CONAN_REMOTE_USER" \
            --password "$CONAN_REMOTE_TOKEN"
          conan upload "curvepress/${{ github.ref_name }}" \
            --remote curvepress-remote --confirm
        env:
          CONAN_REMOTE_URL: ${{ secrets.CONAN_REMOTE_URL }}
          CONAN_REMOTE_USER: ${{ vars.CONAN_REMOTE_USER }}
          CONAN_REMOTE_TOKEN: ${{ secrets.CONAN_REMOTE_TOKEN }}

  # ─── WASM ────────────────────────────────────────────────────────────────────
  wasm:
    name: WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM (bundler — for npm publish)
        run: wasm-pack build --target bundler --out-dir pkg --features wasm

      - name: Build WASM (nodejs — for tests)
        run: wasm-pack build --target nodejs --out-dir pkg-node --features wasm

      - name: Run WASM tests
        run: node tests/wasm/test_wasm.mjs

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: pkg/

  # Publish to npm on tag.
  # Pre-requisite: set NPM_TOKEN secret (Automation token from npmjs.com).
  npm-publish:
    name: Publish to npm
    if: startsWith(github.ref, 'refs/tags/v')
    needs: wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM (bundler)
        run: wasm-pack build --target bundler --out-dir pkg --features wasm

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: npm publish
        run: npm publish pkg/ --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
