version: 2
updates:
  # Rust crate dependencies (Cargo.toml / Cargo.lock)
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Actions used in the GitHub Actions workflows (.github/workflows)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
